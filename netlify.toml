[build]
  publish = "frontend"

# Proxy API calls to Railway backend
[[redirects]]
  from = "/api/*"
  to = "https://pruebaproyecto-production.up.railway.app/api/:splat"
  status = 200
  force = true

# SPA fallback — all routes go to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
