<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAED — Sistema de Administración Residencial</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface": "#FFFFFF",
            "surface-dim": "#dadada",
            "surface-bright": "#f9f9f9",
            "surface-container-lowest": "#ffffff",
            "surface-container-low": "#f3f3f3",
            "surface-container": "#eeeeee",
            "surface-container-high": "#e8e8e8",
            "surface-container-highest": "#e2e2e2",
            "on-surface": "#1b1b1b",
            "on-surface-variant": "#4c4546",
            "outline-variant": "#cfc4c5",
            "primary": "#0F2044",
            "on-primary": "#ffffff",
            "primary-container": "#1b1b1b",
            "on-primary-container": "#848484",
            "on-secondary": "#ffffff",
            "secondary": "#5d5f5f",
            "secondary-container": "#dfe0e0",
            "on-secondary-container": "#616363",
            "background": "#EEF2F8",
            "on-background": "#0F172A",
            "error": "#ba1a1a",
            "on-error": "#ffffff",
            "error-container": "#ffdad6",
            "on-error-container": "#93000a",
            "accent-green": "#065F46",
            "accent-green-bg": "#D1FAE5",
            "warn-amber": "#92400E",
            "warn-amber-bg": "#FEF3C7"
          },
          borderRadius: {
            "xl": "0.75rem",
            "2xl": "1.5rem",
            "full": "9999px"
          },
          spacing: {
            "stack-gap": "24px",
            "pill-padding-y": "8px",
            "sidebar-width": "72px",
            "grid-gutter": "24px",
            "container-padding": "32px",
            "pill-padding-x": "16px"
          },
          fontFamily: {
            "sans": ["Plus Jakarta Sans", "DM Sans", "system-ui", "sans-serif"]
          },
          fontSize: {
            "headline-lg": ["32px", { lineHeight: "40px", letterSpacing: "-0.01em", fontWeight: "700" }],
            "headline-md": ["24px", { lineHeight: "32px", fontWeight: "600" }],
            "body-lg": ["18px", { lineHeight: "28px", fontWeight: "400" }],
            "display-bold": ["48px", { lineHeight: "56px", letterSpacing: "-0.02em", fontWeight: "700" }],
            "label-caps": ["12px", { lineHeight: "16px", letterSpacing: "0.05em", fontWeight: "700" }],
            "body-md": ["16px", { lineHeight: "24px", fontWeight: "400" }],
            "stat-number": ["36px", { lineHeight: "44px", fontWeight: "700" }],
            "label-pill": ["13px", { lineHeight: "18px", fontWeight: "600" }]
          },
          boxShadow: {
            "soft": "0px 4px 20px rgba(0, 0, 0, 0.03)"
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/style.css?v=3">
</head>
<body>
  <div id="app"></div>
  <div id="toast-container" class="toast-container" role="alert" aria-live="polite"></div>

  <!-- Login Page Template -->
  <template id="tpl-login">
    <div class="login-page">
      <div class="login-container">
        <main class="login-main">
          <div class="login-card">
            <div class="login-header">
              <div class="login-logo">
                <img alt="SAED Logo" src="imagenes/magnific__logomark-representing-apartment-building-managemen__15461.png" style="width:64px;height:64px;object-fit:contain;">
              </div>
              <h1>SAED</h1>
              <p class="login-subtitle">Acceso seguro a tu edificio</p>
            </div>

            <form id="login-form" class="login-form">
              <div class="floating-input">
                <input type="text" id="login-username" class="floating-input-field" placeholder="Usuario" required autocomplete="username">
                <label class="floating-label" for="login-username">Usuario</label>
              </div>

              <div class="floating-input">
                <input type="password" id="login-password" class="floating-input-field" placeholder="Contraseña" required autocomplete="current-password">
                <label class="floating-label" for="login-password">Contraseña</label>
                <button type="button" class="password-toggle" onclick="togglePasswordVisibility()" tabindex="-1" aria-label="Mostrar contraseña">
                  <span class="material-symbols-outlined" id="visibility-icon">visibility_off</span>
                </button>
              </div>

              <div class="login-options">
                <label class="checkbox-label">
                  <input type="checkbox" id="login-remember">
                  <span>Recordarme</span>
                </label>
                <a href="#" class="forgot-link" id="forgot-link">¿Olvidaste tu contraseña?</a>
              </div>

              <button type="submit" class="login-btn">
                Iniciar Sesión
                <span class="material-symbols-outlined">arrow_forward</span>
              </button>
            </form>
          </div>
          <p class="login-footer">&copy; <span id="footer-year"></span> SAED Residential. All rights reserved.</p>
        </main>
        <aside class="login-hero">
          <div class="hero-gallery" id="hero-gallery">
            <div class="hero-track" id="hero-track">
              <div class="hero-slide"></div>
              <div class="hero-slide"></div>
              <div class="hero-slide"></div>
              <div class="hero-slide"></div>
              <div class="hero-slide"></div>
              <div class="hero-slide"></div>
            </div>
          </div>
          <div class="hero-dots" id="hero-dots"></div>
          <p class="hero-slogan">SAED — Seguridad, organización y confianza</p>
        </aside>
      </div>
    </div>
  </template>

  <!-- App Shell Template -->
  <template id="tpl-shell">
    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>
    <aside class="sidebar-desktop" id="sidebar">
      <div class="sidebar-logo-area">
        <div class="sidebar-logo-icon">
          <img src="imagenes/magnific__logomark-representing-apartment-building-managemen__15461.png" alt="SAED" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
          <span style="display:none;align-items:center;justify-content:center;width:34px;height:34px;background:rgba(255,255,255,0.15);border-radius:8px;font-weight:800;color:white;font-size:16px">S</span>
        </div>
        <div class="sidebar-logo-text">
          <span>SAED</span>
          <small>Administración Residencial</small>
        </div>
      </div>
      <div class="sidebar-nav-area">
        <nav id="sidebar-nav"></nav>
      </div>
      <div class="sidebar-bottom">
        <button class="sidebar-btn" onclick="Auth.logout();toggleSidebar();Router.navigate('login')" title="Cerrar Sesión">
          <span class="material-symbols-outlined">logout</span>
          <span class="sidebar-label">Cerrar Sesión</span>
        </button>
      </div>
    </aside>
    <div style="margin-left:var(--sidebar-width);flex:1;display:flex;flex-direction:column;height:100%;overflow:hidden;min-width:0;">
      <header class="topbar flex items-center justify-between pl-container-padding pr-container-padding w-full h-20 bg-transparent z-10 sticky top-0">
        <div class="flex items-center gap-4 topbar-left">
          <button class="hamburger-btn" onclick="toggleSidebar()" aria-label="Abrir menú" style="display:none">
              <span class="material-symbols-outlined" style="font-size:22px">menu</span>
            </button>
          <img src="imagenes/logo.png" alt="SAED" style="width:28px;height:28px;object-fit:contain;margin-right:10px;">
          <h1 class="page-title text-headline-md font-headline-md text-on-background" id="page-title">Dashboard</h1>
        </div>
        <div class="topbar-right flex items-center gap-4">
          <div class="user-info flex items-center gap-3">
            <span class="w-9 h-9 rounded-full bg-primary text-on-primary flex items-center justify-center text-sm font-bold user-avatar" id="topbar-avatar">U</span>
            <span class="text-body-md font-body-md text-on-surface user-name" id="topbar-user"></span>
            <span class="badge-role text-label-caps font-label-caps text-on-surface-variant uppercase px-3 py-1 rounded-full bg-surface-container" id="topbar-role"></span>
          </div>
        </div>
      </header>
      <div class="content-area p-container-padding pt-6 w-full max-w-[1600px] mx-auto flex-1 overflow-y-auto" id="content-area"></div>
    </div>
  </template>

  <!-- Page: Dashboard -->
  <template id="tpl-dashboard">
    <div style="display:flex;flex-direction:column;gap:20px">

      <!-- ── STAT CARDS ── -->
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px">

        <div class="stat-card" style="cursor:default">
          <div class="stat-icon primary"><span class="material-symbols-outlined">groups</span></div>
          <div class="stat-body">
            <div class="stat-value" id="stat-residentes">—</div>
            <div class="stat-label">Residentes</div>
          </div>
          <div class="stat-badge"><span class="material-symbols-outlined">groups</span></div>
        </div>

        <div class="stat-card" style="cursor:default">
          <div class="stat-icon blue"><span class="material-symbols-outlined">domain</span></div>
          <div class="stat-body">
            <div class="stat-value" id="stat-apartamentos">—</div>
            <div class="stat-label">Apartamentos</div>
          </div>
          <div class="stat-badge"><span class="material-symbols-outlined">domain</span></div>
        </div>

        <div class="stat-card" style="cursor:default">
          <div class="stat-icon green"><span class="material-symbols-outlined">description</span></div>
          <div class="stat-body">
            <div class="stat-value" id="stat-contratos">—</div>
            <div class="stat-label">Contratos Activos</div>
          </div>
          <div class="stat-badge"><span class="material-symbols-outlined">description</span></div>
        </div>

      </div>

      <!-- ── MULTAS + COBROS ── -->
      <div style="display:grid;grid-template-columns:1fr 360px;gap:16px;align-items:start">

        <!-- Multas Pendientes -->
        <div class="card" style="margin-bottom:0">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:8px">
            <div style="display:flex;align-items:center;gap:10px">
              <div style="width:36px;height:36px;border-radius:8px;background:var(--warn-50);display:flex;align-items:center;justify-content:center;flex-shrink:0">
                <span class="material-symbols-outlined" style="font-size:18px;color:var(--warn-600)">gavel</span>
              </div>
              <div>
                <div style="font-size:15px;font-weight:700;color:var(--text)">Multas Pendientes</div>
                <div style="font-size:12px;color:var(--text-muted);margin-top:1px" id="dash-multas-count"></div>
              </div>
            </div>
            <button class="btn btn-outline btn-sm" onclick="Dash.notificarTodas()" id="btn-notificar-todas">
              <span class="material-symbols-outlined" style="font-size:14px">notifications</span>
              Notificar todos
            </button>
          </div>
          <div id="dash-multas-content">
            <p class="text-muted text-sm">Cargando...</p>
          </div>
        </div>

        <!-- Próximos Cobros -->
        <div class="card" style="margin-bottom:0">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px">
            <div style="width:36px;height:36px;border-radius:8px;background:var(--success-50);display:flex;align-items:center;justify-content:center;flex-shrink:0">
              <span class="material-symbols-outlined" style="font-size:18px;color:var(--success-600)">payments</span>
            </div>
            <div>
              <div style="font-size:15px;font-weight:700;color:var(--text)">Próximos Cobros</div>
              <div style="font-size:12px;color:var(--text-muted);margin-top:1px">Contratos activos</div>
            </div>
          </div>
          <div id="dash-proximos-cobros" style="display:flex;flex-direction:column;gap:6px;max-height:400px;overflow-y:auto">
            <p class="text-muted text-sm">Cargando...</p>
          </div>
        </div>

      </div>
    </div>
  </template>
  <template id="tpl-residentes">
    <div class="table-container">
      <div class="table-toolbar">
        <div class="actions">
          <button class="btn btn-accent btn-sm" onclick="Residentes.mostrarFormulario()">+ Nuevo Residente</button>
        </div>
      </div>
      <table class="data-table" id="tbl-residentes">
        <thead>
          <tr>
            <th>ID</th><th>Nombres</th><th>Apellidos</th><th>Documento</th><th>Edad</th><th>Apto</th><th>Telefono</th><th>Email</th><th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tbody-residentes"></tbody>
      </table>
      <div id="pagination-residentes"></div>
      <div id="residentes-empty" class="empty-state hidden"><div class="empty-icon"><span class="material-symbols-outlined" style="font-size:48px">people</span></div><div class="empty-title">No hay residentes registrados</div></div>
    </div>
  </template>

  <!-- Page: Apartamentos -->
  <template id="tpl-apartamentos">
    <div class="table-container">
      <div class="table-toolbar">
        <div class="actions">
          <button class="btn btn-accent btn-sm" onclick="Apartamentos.mostrarFormulario()">+ Nuevo Apartamento</button>
        </div>
      </div>
      <table class="data-table" id="tbl-apartamentos">
        <thead>
          <tr>
            <th>ID</th><th>Numero</th><th>Piso</th><th>Tipo</th><th>Area m&sup2;</th><th>Estado</th><th>Residentes</th><th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tbody-apartamentos"></tbody>
      </table>
      <div id="pagination-apartamentos"></div>
    </div>
  </template>

  <!-- Page: Contratos -->
  <template id="tpl-contratos">
    <div class="table-container">
      <div class="table-toolbar">
        <div class="filters">
          <select id="con-filtro-estado" class="form-control filter-select" onchange="Contratos.cargar()">
            <option value="">Todos los estados</option>
            <option value="ACTIVO">Activo</option>
            <option value="SUSPENDIDO">Suspendido</option>
            <option value="VENCIDO">Vencido</option>
            <option value="PENDIENTE_FIRMA">Pendiente Firma</option>
          </select>
        </div>
        <div class="actions">
          <button class="btn btn-accent btn-sm" onclick="Contratos.mostrarFormulario()">+ Nuevo Contrato</button>
        </div>
      </div>
      <table class="data-table" id="tbl-contratos">
        <thead>
          <tr>
            <th>ID</th><th>Apartamento</th><th>Arrendatario</th><th>Inicio</th><th>Fin</th><th>Tipo</th><th>Valor Mensual</th><th>Estado</th><th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tbody-contratos"></tbody>
      </table>
      <div id="pagination-contratos"></div>
    </div>
  </template>

  <!-- Page: Pagos -->
  <template id="tpl-pagos">
    <!-- KPI strip -->
    <div class="card-grid mb-16">
      <div class="stat-card">
        <div class="stat-icon yellow"><span class="material-symbols-outlined">receipt_long</span></div>
        <div class="stat-body">
          <div class="stat-value" id="pagos-kpi-cuotas" style="color:var(--warning)">$0</div>
          <div class="stat-label">Cuotas pendientes</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon red"><span class="material-symbols-outlined">gavel</span></div>
        <div class="stat-body">
          <div class="stat-value" id="pagos-kpi-multas" style="color:var(--danger)">$0</div>
          <div class="stat-label">Multas pendientes</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon blue"><span class="material-symbols-outlined">apartment</span></div>
        <div class="stat-body">
          <div class="stat-value" id="pagos-kpi-aptos">0 aptos</div>
          <div class="stat-label">Con saldo pendiente</div>
        </div>
      </div>
    </div>

    <!-- Tabla de apartamentos -->
    <div class="table-container">
      <div class="table-toolbar">
        <span>Apartamentos con saldos pendientes</span>
        <div class="actions">
          <button class="btn btn-outline btn-sm" onclick="Pagos.cargar()">
            <span class="material-symbols-outlined" style="font-size:16px;vertical-align:middle">refresh</span>
            Actualizar
          </button>
        </div>
      </div>
      <table class="data-table">
        <thead>
          <tr>
            <th>Apartamento</th>
            <th>Residente</th>
            <th>Cuotas pendientes</th>
            <th>Multas pendientes</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tbody-pagos-res"></tbody>
      </table>
    </div>
  </template>

  <!-- Page: Visitas -->
  <template id="tpl-visitas">
    <div class="tabs" id="visitas-tabs" role="tablist">
      <div class="tab active" role="tab" aria-selected="true" data-tab="tab-visita-nueva" onclick="Visitas.cambiarTab('tab-visita-nueva')">Registrar Visita</div>
      <div class="tab" role="tab" aria-selected="false" data-tab="tab-visita-frecuente" onclick="Visitas.cambiarTab('tab-visita-frecuente')">Visita Rapida (Frecuentes)</div>
    </div>
    <div class="tab-content active" id="tab-visita-nueva" role="tabpanel"></div>
    <div class="tab-content" id="tab-visita-frecuente" role="tabpanel"></div>
  </template>

  <!-- Page: Parqueaderos -->
  <template id="tpl-parqueaderos">
    <div class="table-container">
      <div class="table-toolbar">
        <div class="filters">
          <select id="parq-filtro-estado" class="form-control filter-select" onchange="Parqueaderos.aplicarFiltros()">
            <option value="">Todos los Estados</option>
            <option value="DISPONIBLE">Disponible</option>
            <option value="OCUPADO">Ocupado</option>
            <option value="EN_MANTENIMIENTO">Mantenimiento</option>
          </select>
          <select id="parq-filtro-tipo" class="form-control filter-select" onchange="Parqueaderos.aplicarFiltros()">
            <option value="">Todos los Tipos</option>
            <option value="VEHICULO">Vehiculo</option>
            <option value="MOTO">Moto</option>
            <option value="BICICLETA">Bicicleta</option>

          </select>
        </div>
        <div class="actions">
          <button class="btn btn-accent btn-sm" onclick="Parqueaderos.mostrarFormulario()">+ Nuevo Parqueadero</button>
        </div>
      </div>
      <table class="data-table" id="tbl-parqueaderos">
        <thead><tr><th>ID</th><th>Codigo</th><th>Tipo</th><th>Visitante</th><th>Estado</th><th>Apartamento</th><th>Propietario</th><th>Acciones</th></tr></thead>
        <tbody id="tbody-parqueaderos"></tbody>
      </table>
      <div id="pagination-parqueaderos"></div>
    </div>
  </template>

  <!-- Page: Usuarios -->
  <template id="tpl-usuarios">
    <div class="table-container">
      <div class="table-toolbar">
        <div class="filters">
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer">
            <input type="checkbox" id="usr-filtrar-residentes" onchange="Usuarios.cargar()">
            <span>Ocultar no residentes</span>
          </label>
        </div>
        <div class="actions">
          <button class="btn btn-accent btn-sm" onclick="Usuarios.mostrarFormulario()">+ Nuevo Usuario</button>
        </div>
      </div>
      <table class="data-table" id="tbl-usuarios">
        <thead><tr><th>ID</th><th>Username</th><th>Rol</th><th>Residente</th><th>Apto</th><th>Activo</th><th>Ultimo Login</th><th>Acciones</th></tr></thead>
        <tbody id="tbody-usuarios"></tbody>
      </table>
      <div id="pagination-usuarios"></div>
    </div>
  </template>

  <!-- Page: Alertas -->
  <template id="tpl-alertas">
    <div class="table-container">
      <div class="table-toolbar">
        <div class="filters">
          <label><input type="checkbox" id="alerta-solo-no-leidas" onchange="Alertas.cargar()"> Solo no leidas</label>
        </div>
        <div class="actions">
          <button class="btn btn-primary btn-sm" onclick="Alertas.marcarLeida()">Marcar como Leida</button>
        </div>
      </div>
      <table class="data-table" id="tbl-alertas">
        <thead><tr><th>ID</th><th>Tipo</th><th>Apartamento</th><th>Residente</th><th>Periodo</th><th>Estado Cuota</th><th>Canal</th><th>Leida</th><th>Enviada</th></tr></thead>
        <tbody id="tbody-alertas"></tbody>
      </table>
      <div id="pagination-alertas"></div>
    </div>
  </template>

  <!-- Page: Escanner QR -->
  <template id="tpl-escanner-qr">
    <div class="tabs" id="qr-tabs" role="tablist">
      <div class="tab active" role="tab" aria-selected="true" data-tab="tab-qr-validar" onclick="EscannerQR.cambiarTab('tab-qr-validar')">Validar Entrada</div>
      <div class="tab" role="tab" aria-selected="false" data-tab="tab-qr-parqueaderos" onclick="EscannerQR.cambiarTab('tab-qr-parqueaderos')">Parqueaderos</div>
    </div>
    <div class="tab-content active" id="tab-qr-validar" role="tabpanel"></div>
    <div class="tab-content" id="tab-qr-parqueaderos" role="tabpanel"></div>
  </template>

  <!-- Page: Residente Dashboard -->
  <template id="tpl-residente-dashboard">
    <div class="card-grid-4" id="res-kpis">
      <div class="stat-card">
        <div class="stat-icon blue"><span class="material-symbols-outlined">apartment</span></div>
        <div class="stat-body"><div class="stat-value" id="res-kpi-apartamento" style="font-size:24px">-</div><div class="stat-label">Apartamento</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon amber"><span class="material-symbols-outlined">description</span></div>
        <div class="stat-body"><div class="stat-value" id="res-kpi-contrato" style="font-size:16px">-</div><div class="stat-label">Estado Contrato</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon green"><span class="material-symbols-outlined">payments</span></div>
        <div class="stat-body"><div class="stat-value" id="res-kpi-cuotas-arriendo" style="font-size:24px">-</div><div class="stat-label">Cuotas de Arriendo</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon red"><span class="material-symbols-outlined">gavel</span></div>
